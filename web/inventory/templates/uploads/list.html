{% extends "base.html" %} {% load django_tables2 %} {% block title %}Uploads -
Inventory{% endblock %} {% block content %}
<div class="container-fluid">
  <div class="row mb-4">
    <div class="col-6">
      <h2>CSV Uploads</h2>
    </div>
    <div class="col-6 text-end">
      <a href="{% url 'upload-create' %}" class="btn btn-primary"
        >Upload New CSV</a
      >
    </div>
  </div>

  {% if table %} {% render_table table %} {% else %}
  <div class="card">
    <div class="card-body">
      <p class="text-muted">No uploads yet.</p>
      <a href="{% url 'upload-create' %}" class="btn btn-primary"
        >Upload your first CSV</a
      >
    </div>
  </div>
  {% endif %}
</div>
{% endblock %}
