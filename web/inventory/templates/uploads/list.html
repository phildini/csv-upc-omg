{% extends "base.html" %}
{% load django_tables2 %}

{% block title %}Uploads — csv-upc-omg{% endblock %}

{% block content %}
<div class="flex justify-between items-center mb-6">
  <h1 class="text-3xl font-bold">CSV Uploads</h1>
  <a href="{% url 'upload-create' %}" class="btn btn-primary">
    <svg xmlns="http://www.w3.org/2000/svg" class="h-5 w-5 mr-1" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 16v1a3 3 0 003 3h10a3 3 0 003-3v-1m-4-8l-4-4m0 0L8 8m4-4v12" /></svg>
    Upload New CSV
  </a>
</div>

{% if table %}
  {% render_table table %}
{% else %}
<div class="card bg-base-100 shadow-sm">
  <div class="card-body items-center text-center">
    <p class="text-base-content/60 mb-4">No uploads yet.</p>
    <a href="{% url 'upload-create' %}" class="btn btn-primary">Upload your first CSV</a>
  </div>
</div>
{% endif %}
{% endblock %}
